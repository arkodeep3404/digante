<!doctype html>
<html lang="en">

<head>
    <title>Digante - Choose Service</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="fonts/icomoon/style.css">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/jquery-ui.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">

    <link rel="stylesheet" href="css/jquery.fancybox.min.css">

    <link rel="stylesheet" href="css/bootstrap-datepicker.css">

    <link rel="stylesheet" href="fonts/flaticon/font/flaticon.css">

    <link rel="stylesheet" href="css/aos.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            /* Prevent scrolling if fits in viewport */
        }

        .site-wrap {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .hero-choice {
            flex: 1;
            position: relative;
            background-image: url('images/1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-choice .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .choice-container {
            position: relative;
            z-index: 2;
            width: 100%;
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .choice-card-wrapper {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .choice-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            text-decoration: none !important;
            color: inherit;
        }

        .choice-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: #ffffff;
        }

        .choice-card .icon-wrap {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            background: #f8f9fa;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .choice-card:hover .icon-wrap {
            background: #e9ecef;
        }

        .choice-card .icon-wrap img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .choice-card h2 {
            font-size: 24px;
            color: #3c90f7;
            margin-bottom: 15px;
            font-weight: 700;
            font-family: "Playfair Display", serif;
        }

        .choice-card p {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .site-logo {
            margin-bottom: 4rem;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .site-logo a {
            font-size: 40px;
            color: #fff;
            font-weight: 700;
            font-family: "Playfair Display", serif;
        }

        @media (max-width: 768px) {

            body,
            html {
                overflow: auto;
                height: auto;
            }

            .choice-container {
                padding-top: 50px;
                padding-bottom: 50px;
            }
        }
    </style>

</head>

<body data-spy="scroll" data-target=".site-navbar-target" data-offset="300">

    <div id="overlayer"></div>
    <div class="loader">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <div class="site-wrap">

        <div class="hero-choice">
            <div class="overlay"></div>

            <div class="container choice-container">

                <div class="row justify-content-center">
                    <div class="col-12 text-center">
                        <div class="site-logo">
                            <a href="index.html">Digante</a>
                            <p style="color: rgba(255,255,255,0.8); font-size: 1.2rem; margin-top: 10px;">Select your
                                service</p>
                        </div>
                    </div>
                </div>

                <div class="row justify-content-center">

                    <div class="col-md-5 col-lg-4 choice-card-wrapper">
                        <a href="digante.html" class="choice-card">
                            <span class="icon-wrap">
                                <img src="images/digante.jpeg" alt="Digante Old Age Home" class="img-fluid">
                            </span>
                            <h2>Digante Old Age Home</h2>
                            <p>Premium senior living facility with 24x7 medical care in a homely atmosphere.</p>
                            <span class="btn btn-primary btn-sm px-4 py-2">Enter Site</span>
                        </a>
                    </div>

                    <div class="col-md-5 col-lg-4 choice-card-wrapper">
                        <a href="care.html" class="choice-card">
                            <span class="icon-wrap">
                                <img src="images/care.jpeg" alt="Elderly HomeCare" class="img-fluid">
                            </span>
                            <h2>Digante Elderly Home Care</h2>
                            <p>Professional home care services and nursing delivered right to your doorstep.</p>
                            <span class="btn btn-primary btn-sm px-4 py-2">Visit Home Care</span>
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/jquery-ui.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.countdown.min.js"></script>
    <script src="js/jquery.easing.1.3.js"></script>
    <script src="js/aos.js"></script>
    <script src="js/jquery.waypoints.min.js"></script>
    <script src="js/jquery.animateNumber.min.js"></script>
    <script src="js/jquery.fancybox.min.js"></script>
    <script src="js/jquery.sticky.js"></script>
    <script src="js/isotope.pkgd.min.js"></script>

    <script src="js/main.js"></script>

</body>

</html>
